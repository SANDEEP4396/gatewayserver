  gatewayserver:
    image: sandeep4396/gatewayserver:latest
    container_name: gatewayserver-ms
    ports:
      - "8072:8072"
    depends_on:
      #      redis:
      #        condition: service_healthy
      accounts:
        condition: service_healthy
      loans:
        condition: service_healthy
      cards:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI: "http://keycloak:8080/realms/master/protocol/openid-connect/certs"
      #      SPRING_DATA_REDIS_HOST: redis # This configuration allows the gateway server to connect to the Redis server running in the redis container using the hostname "redis". This is necessary for the gateway server to perform caching and other Redis-related operations.
