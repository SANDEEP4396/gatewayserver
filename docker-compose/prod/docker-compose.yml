  accounts:
    image: sandeep4396/accounts-svc:latest
    container_name: accounts-svc
    healthcheck:
      test: "curl --fail --silent http://localhost:8080/actuator/health/readiness | grep UP || exit 1" # This command checks the health of the accounts service by making a request to the /actuator/readiness endpoint and checking if the response contains "UP". If the response does not contain "UP", it will exit with a non-zero status, indicating that the service is not healthy.
      interval: 20s # This specifies that the health check should be performed every 10s
      timeout: 5s # This specifies that the health check should time out if it takes longer than 10s to complete.
      retries: 20 # This specifies that the health check should be retried up to 3 times if it fails before marking the service as unhealthy.
      start_period: 10s # This specifies that the health check should start after a 10s delay from the time the container starts. This allows the accounts service some time to initialize before the health checks begin, preventing false negatives during startup.
    depends_on:
      #      accountsDB:
      #        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      configserver:
        condition: service_healthy # This ensures that the accounts service will only start after the configuration server has started successfully. This is important because the accounts service relies on the configuration server to fetch its configuration properties, and starting it before the configuration server is ready could lead to errors or misconfigurations.
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      OTEL_SERVICE_NAME: "accounts"
    #      SPRING_DATASOURCE_URL: jdbc:mysql://accountsDB:3306/accountsDB # This configuration allows the accounts service to connect to the MySQL database running in the accountsDB container using the hostname "accountsDB" and the default MySQL port 3306. This is necessary for the accounts service to perform database operations such as storing and retrieving account information.
    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config
  loans:
    image: sandeep4396/loans-svc:latest
    container_name: loans-svc
    healthcheck:
      test: "curl --fail --silent http://localhost:8090/actuator/health/readiness | grep UP || exit 1" # This command checks the health of the accounts service by making a request to the /actuator/readiness endpoint and checking if the response contains "UP". If the response does not contain "UP", it will exit with a non-zero status, indicating that the service is not healthy.
      interval: 20s # This specifies that the health check should be performed every 10s
      timeout: 5s # This specifies that the health check should time out if it takes longer than 10s to complete.
      retries: 20 # This specifies that the health check should be retried up to 3 times if it fails before marking the service as unhealthy.
      start_period: 10s
    depends_on:
      #      loansDB:
      #        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
      OTEL_SERVICE_NAME: "loans"
    #      SPRING_DATASOURCE_URL: jdbc:mysql://loansDB:3306/loansDB # This configuration allows the loans service to connect to the MySQL database running in the loansDB container using the hostname "loansDB" and the default MySQL port 3306. This is necessary for the loans service to perform database operations such as storing and retrieving loan information.
    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config
  cards:
    image: sandeep4396/cards_svc:latest
    container_name: cards-svc
    healthcheck:
      test: "curl --fail --silent http://localhost:9000/actuator/health/readiness | grep UP || exit 1" # This command checks the health of the accounts service by making a request to the /actuator/readiness endpoint and checking if the response contains "UP". If the response does not contain "UP", it will exit with a non-zero status, indicating that the service is not healthy.
      interval: 20s # This specifies that the health check should be performed every 10s
      timeout: 5s # This specifies that the health check should time out if it takes longer than 10s to complete.
      retries: 20 # This specifies that the health check should be retried up to 3 times if it fails before marking the service as unhealthy.
      start_period: 10s
    depends_on:
      configserver:
        condition: service_healthy
      #      cardsDB:
      #        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "cards"
      OTEL_SERVICE_NAME: "cards"
    #      SPRING_DATASOURCE_URL: jdbc:mysql://cardsDB:3306/cardsDB # This configuration allows the cards service to connect to the MySQL database running in the cardsDB container using the hostname "cardsDB" and the default MySQL port 3306. This is necessary for the cards service to perform database operations such as storing and retrieving card information.
    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config

  configserver:
    image: sandeep4396/configserver:latest
    container_name: configserver
    ports:
      - "8071:8071"
    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent http://localhost:8071/actuator/health/readiness | grep UP || exit 1" # This command checks the health of the configuration server by making a request to the /actuator/readiness endpoint and checking if the response contains "UP". If the response does not contain "UP", it will exit with a non-zero status, indicating that the service is not healthy.
      interval: 20s # This specifies that the health check should be performed every 10s
      timeout: 5s # This specifies that the health check should time out if it takes longer than 10s to complete.
      retries: 20 # This specifies that the health check should be retried up to 3 times if it fails before marking the service as unhealthy.
      start_period: 10s # This specifies that the health check should start after a 10s delay from the time the container starts. This allows the configuration server some time to initialize before the health checks begin, preventing false negatives during startup.
    extends:
      file: common-config.yml
      service: microservice-base-config
    environment:
      OTEL_SERVICE_NAME: "configserver"

  eurekaserver:
    image: sandeep4396/eurekaserver:latest
    container_name: eurekaserver
    ports:
      - "8070:8070"
    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent http://localhost:8070/actuator/health/readiness | grep UP || exit 1" # This command checks the health of the configuration server by making a request to the /actuator/readiness endpoint and checking if the response contains "UP". If the response does not contain "UP", it will exit with a non-zero status, indicating that the service is not healthy.
      interval: 20s # This specifies that the health check should be performed every 10s
      timeout: 5s # This specifies that the health check should time out if it takes longer than 10s to complete.
      retries: 20 # This specifies that the health check should be retried up to 3 times if it fails before marking the service as unhealthy.
      start_period: 10s # This specifies that the health check should start after a 10s delay from the time the container starts. This allows the configuration server some time to initialize before the health checks begin, preventing false negatives during startup.
    extends:
      file: common-config.yml
      service: microservice-configserver-config
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"
      OTEL_SERVICE_NAME: "eurekaserver"

